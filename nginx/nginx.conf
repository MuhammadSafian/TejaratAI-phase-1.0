events {
    worker_connections 1024;
}

http {
    upstream gateway {
        server tijarat-gateway:3000;
    }

    upstream dashboard {
        server tijarat-dashboard:3000;
    }

    upstream ai_core {
        server tijarat-ai-core:8000;
    }

    # ── Rate Limiting ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=100r/s;

    server {
        listen 443 ssl http2;
        server_name tejarat.ai;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Security headers
        add_header X-Frame-Options    DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection   "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Dashboard (frontend) ─────────────────────
        location / {
            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Gateway API ──────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Webhooks (higher rate) ───────────────────
        location /webhooks/ {
            limit_req zone=webhooks burst=50 nodelay;
            proxy_pass http://gateway/webhooks/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── AI Core direct (internal only ideally) ───
        location /ai/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_core/api/v1/;
            proxy_set_header Host $host;
        }
    }

    # ── HTTP → HTTPS redirect ────────────────────────
    server {
        listen 80;
        server_name tejarat.ai;
        return 301 https://$host$request_uri;
    }
}
