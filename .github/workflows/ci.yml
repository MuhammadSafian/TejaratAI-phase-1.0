name: Tejarat AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. Lint & Test Gateway ────────────────────────
  gateway-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - run: npm ci
      - run: npm run lint || true
      - run: npm test -- --passWithNoTests

      # Security: npm audit
      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # ── 2. Lint & Test AI Core ────────────────────────
  ai-core-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: tijarat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    defaults:
      run:
        working-directory: services/ai_core
    env:
      DATABASE_URL: postgresql://postgres:testpass@localhost:5432/tijarat_test
      REDIS_URL: redis://localhost:6379
      TESTING: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff bandit

      # Linting
      - name: Run ruff linter
        run: ruff check . --ignore=E501,F401 || true

      # Security scan
      - name: Run Bandit security scan
        run: bandit -r . -ll -x ./tests || true

      # Init test DB
      - name: Initialize test database
        run: |
          psql -h localhost -U postgres -d tijarat_test -f ../../init-scripts/init.sql
        env:
          PGPASSWORD: testpass

      # Tests
      - name: Run pytest
        run: python -m pytest tests/ -v --tb=long -p pytest_asyncio --asyncio-mode=auto

  # ── 3. Build Docker Images ────────────────────────
  build:
    needs: [gateway-test, ai-core-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service: [gateway, ai_core]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy Staging (develop branch) ─────────────
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tijarat-staging
            docker compose pull
            docker compose up -d
