version: '3.9'

networks:
  tijarat_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:


services:

  # ── 1. API Gateway (NestJS) ────────────────────────────
  tijarat-gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    image: tijarat-gateway:latest
    container_name: tijarat-gateway
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://tijarat:${DB_PASSWORD}@tijarat-db:5432/tijarat
      - REDIS_URL=redis://tijarat-cache:6379
      - JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private
      - SHOPIFY_API_KEY=${SHOPIFY_API_KEY}
      - SHOPIFY_API_SECRET=${SHOPIFY_API_SECRET}
      - DARAZ_APP_KEY=${DARAZ_APP_KEY}
      - DARAZ_APP_SECRET=${DARAZ_APP_SECRET}
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY}
      - AI_CORE_URL=http://tijarat-ai-core:8000
      - APP_URL=${APP_URL}
    depends_on:
      tijarat-db: { condition: service_healthy }
      tijarat-cache: { condition: service_healthy }
    secrets:
      - jwt_private
      - jwt_public
    networks:
      - tijarat_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── 2. AI Core (FastAPI + LangGraph) ──────────────────
  tijarat-ai-core:
    build:
      context: ./services/ai_core
      dockerfile: Dockerfile
    image: tijarat-ai-core:latest
    container_name: tijarat-ai-core
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://tijarat:${DB_PASSWORD}@tijarat-db:5432/tijarat
      - REDIS_URL=redis://tijarat-cache:6379
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY}
      - TCS_API_KEY=${TCS_API_KEY}
      - LEOPARDS_API_KEY=${LEOPARDS_API_KEY}
      - LEOPARDS_API_PASSWORD=${LEOPARDS_API_PASSWORD}
      - POSTEX_TOKEN=${POSTEX_TOKEN}
      - TRAX_API_KEY=${TRAX_API_KEY}
      - BLUEEX_USERNAME=${BLUEEX_USERNAME}
      - BLUEEX_PASSWORD=${BLUEEX_PASSWORD}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - CELERY_BROKER=redis://tijarat-cache:6379/1
      - MINIO_URL=http://tijarat-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      tijarat-db: { condition: service_healthy }
      tijarat-cache: { condition: service_healthy }
    networks:
      - tijarat_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── 3. Database (PostgreSQL + TimescaleDB) ─────────────
  tijarat-db:
    image: timescale/timescaledb:latest-pg15
    container_name: tijarat-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=tijarat
      - POSTGRES_USER=tijarat
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tijarat_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tijarat -d tijarat" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 4. Cache (Redis 7) ──────────────────────────────────
  tijarat-cache:
    image: redis:latest
    container_name: tijarat-cache
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - tijarat_net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 5. Background Worker (Celery) ──────────────────────
  tijarat-worker:
    build:
      context: ./services/ai_core
      dockerfile: Dockerfile
    image: tijarat-ai-core:latest
    container_name: tijarat-worker
    command: >
      celery -A core.celery_app worker --loglevel=info --concurrency=4 --queues=default,analytics,reports,notifications
    environment:
      - DATABASE_URL=postgresql+asyncpg://tijarat:${DB_PASSWORD}@tijarat-db:5432/tijarat
      - REDIS_URL=redis://tijarat-cache:6379
      - CELERY_BROKER=redis://tijarat-cache:6379/1
      - CELERY_RESULT_BACKEND=redis://tijarat-cache:6379/2
    depends_on:
      - tijarat-db
      - tijarat-cache
    networks:
      - tijarat_net
    restart: unless-stopped

  # ── 6. Celery Beat (Scheduler) ─────────────────────────
  tijarat-scheduler:
    build:
      context: ./services/ai_core
      dockerfile: Dockerfile
    image: tijarat-ai-core:latest
    container_name: tijarat-scheduler
    command: >
      celery -A core.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://tijarat:${DB_PASSWORD}@tijarat-db:5432/tijarat
      - CELERY_BROKER=redis://tijarat-cache:6379/1
    depends_on:
      - tijarat-db
      - tijarat-cache
    networks:
      - tijarat_net
    restart: unless-stopped

  # ── 7. Dashboard (Next.js) [RAN LOCALLY via npm run dev] ────
  # tijarat-dashboard:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       - NEXT_PUBLIC_API_URL=${APP_URL}/api
  #       - NEXT_PUBLIC_WS_URL=${WS_URL}
  #   image: tijarat-dashboard:latest
  #   container_name: tijarat-dashboard
  #   ports:
  #     - "80:3000"
  #   environment:
  #     - NEXTAUTH_URL=${APP_URL}
  #     - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
  #     - API_URL=http://tijarat-gateway:3000
  #   depends_on:
  #     - tijarat-gateway
  #   networks:
  #     - tijarat_net
  #   restart: unless-stopped

  # ── 8. File Storage (MinIO) ─────────────────────────────
  tijarat-minio:
    image: minio/minio:latest
    container_name: tijarat-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - tijarat_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

secrets:
  jwt_private:
    file: ./secrets/jwt_private.pem
  jwt_public:
    file: ./secrets/jwt_public.pem
